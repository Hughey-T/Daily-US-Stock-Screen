# Universe filters
config_version: "2026-07-mispricing-v2"
min_market_cap_usd: 1000000000
min_price_usd: 1.0
min_avg_dollar_volume_20d: 20000000
exchanges: [NMS, NGM, NCM, NYQ, ASE]

# Download / quality controls
history_period: 1y
batch_size: 150
max_retries: 3
retry_wait_seconds: 8
min_universe_size: 500
min_data_coverage: 0.90
max_candidates: 150
max_universe_cache_age_days: 14

# Signal thresholds
relative_return_threshold: 0.08
volume_ratio_threshold: 1.80
volatility_ratio_threshold: 1.50
single_day_move_threshold: 0.07
gap_threshold: 0.07

# Market-wide coverage: retain strongest and weakest names in every sector
sector_top_n: 2
sector_bottom_n: 2

# Quiet long-term drift selection (initial hypotheses; not backtested)
quiet_drift_enabled: true
quiet_drift_tail_quantile: 0.05
quiet_drift_max_candidates: 100
quiet_drift_max_daily_move_63d: 0.07
quiet_drift_max_gap_63d: 0.07
quiet_drift_max_volume_ratio: 1.80
quiet_drift_max_volatility_ratio: 1.50
quiet_drift_max_single_day_share_63d: 0.20
quiet_drift_min_directional_efficiency_63d: 0.25
quiet_drift_sector_top_n: 1
quiet_drift_sector_bottom_n: 1

# Benchmarks
market_benchmark: SPY
sector_etfs:
  Technology: XLK
  Financial Services: XLF
  Healthcare: XLV
  Consumer Cyclical: XLY
  Consumer Defensive: XLP
  Industrials: XLI
  Basic Materials: XLB
  Energy: XLE
  Utilities: XLU
  Real Estate: XLRE
  Communication Services: XLC
# Data quality validation
min_sector_coverage: 0.90
market_close_buffer_minutes: 15
max_abs_daily_return_for_validation: 2.00
benchmark_fallback_timeout_seconds: 60
max_isolated_price_anomalies: 1
