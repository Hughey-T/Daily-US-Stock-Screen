name: Daily US stock screen

on:
  schedule:
    # US Monday-Friday market close, observed Tuesday-Saturday in Japan.
    # 07:45 JST is safely after the close in both US daylight and standard time.
    - cron: "45 7 * * 2-6"
      timezone: "Asia/Tokyo"

  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if the market date has not changed"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-us-stock-screen
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile src/screen.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run screening
        id: screening
        shell: bash
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set +e
          python src/screen.py
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0
          
      - name: Commit generated data
        if: always()
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs data

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update screening data"
            git pull --rebase origin "$TARGET_BRANCH"
            git push origin "HEAD:$TARGET_BRANCH"
          fi

      - name: Validate screening result
        shell: bash
        run: |
          if [ "${{ steps.screening.outputs.exit_code }}" != "0" ]; then
            echo "::error::screen.py failed with exit code ${{ steps.screening.outputs.exit_code }}"
            exit 1
          fi

          python scripts/check_status.py

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: screen
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
